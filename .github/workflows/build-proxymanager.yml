name: Build Proxy Manager 
on:
  push:
    branches: [ main ]
    paths-ignore: 
      - '**.md'
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened, edited]
    paths-ignore: 
      - '**.md'

env:
  RID: linux-x64
  BUILD_CONFIGURATION: Release
  SOLUTION_PATH: ProxyManager.sln

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore $SOLUTION_PATH

      - name: Build
        run: dotnet build $SOLUTION_PATH --configuration $BUILD_CONFIGURATION --no-restore

      - name: Test
        run: dotnet test $SOLUTION_PATH --configuration $BUILD_CONFIGURATION --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-results
          path: coverage/**/coverage.cobertura.xml
          if-no-files-found: error

      - name: ReportGenerator
        uses: danielpalme/ReportGenerator-GitHub-Action@5.5.4
        with:
          reports: coverage/**/coverage.cobertura.xml
          targetdir: coveragereport
          reporttypes: Html;MarkdownSummaryGithub

      - name: Add comment to PR # Only applicable if 'MarkdownSummaryGithub' or one of the other Markdown report types is generated
        if: github.event_name == 'pull_request'
        run: gh pr comment $PR_NUMBER --edit-last --create-if-none --body-file coveragereport/SummaryGithub.md # Adjust path and filename if necessary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.number }}
          
      - name: Publish coverage in build summary # Only applicable if 'MarkdownSummaryGithub' or one of the other Markdown report types is generated
        run: cat coveragereport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY # Adjust path and filename if necessary
        shell: bash
          

      

  