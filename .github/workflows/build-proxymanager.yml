name: Build Proxy Manager
on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened, edited]
    paths-ignore:
      - '**.md'

env:
  RID: linux-x64
  BUILD_CONFIGURATION: Release
  SOLUTION_PATH: ProxyManager.sln

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          global-json-file: global.json

      - name: Restore dependencies
        run: dotnet restore "$SOLUTION_PATH"

      - name: Build
        run: dotnet build "$SOLUTION_PATH" --configuration "$BUILD_CONFIGURATION" --no-restore

      - name: Test
        run: dotnet test "$SOLUTION_PATH" --configuration "$BUILD_CONFIGURATION" --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory coverage

      - name: ReportGenerator
        uses: danielpalme/ReportGenerator-GitHub-Action@cf6fe1b38ed5becc89ffe056c1f240825993be5b # 5.5.4
        with:
          reports: coverage/**/coverage.cobertura.xml
          targetdir: coveragereport
          reporttypes: Html;MarkdownSummaryGithub

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: CoverageReport
          path: coveragereport

      - name: Publish coverage in build summary
        run: cat coveragereport/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"
        shell: bash

  report:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      pull-requests: write
    steps:
      - name: Download coverage report artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.0
        with:
          name: CoverageReport
          path: coveragereport

      - name: Add comment to PR
        run: gh pr comment "$PR_NUMBER" --edit-last --create-if-none --body-file coveragereport/SummaryGithub.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.number }}
